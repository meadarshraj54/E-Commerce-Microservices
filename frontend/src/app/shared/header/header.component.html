<nav class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-4 py-3 shadow sticky top-0 z-50">
  <div class="container mx-auto flex items-center justify-between flex-wrap">

    <!-- Logo -->
    <a href="/" class="flex items-center space-x-2">
      <span class="text-2xl font-bold text-blue-600 dark:text-blue-400">
        Microservices Shop
      </span>
    </a>

    <!-- Mobile Button -->
    <button
      id="menu-toggle"
      type="button"
      onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
      class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition"
    >
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16m-7 6h7"/>
      </svg>
    </button>

    <!-- Menu -->
    <div id="mobile-menu"
         class="hidden w-full md:block md:w-auto">

      <ul class="flex flex-col md:flex-row md:space-x-6 mt-4 md:mt-0 items-center text-sm font-medium">

        <li>
          @if (isAuthenticated) {

            <span class="block px-3 py-2 text-green-600 dark:text-green-400 font-semibold">
              👋 Hi {{ username }}
            </span>

            <a
              (click)="logout()"
              class="block px-3 py-2 text-red-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-gray-700 rounded transition cursor-pointer">
              Logout
            </a>

          } @else {

            <a
              (click)="login()"
              class="block px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow cursor-pointer">
              Login
            </a>

          }
        </li>

      </ul>
    </div>
  </div>
</nav>
